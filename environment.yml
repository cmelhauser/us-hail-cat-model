# Conda environment for the CONUS Hail Catastrophe Model v2.2
# Used by Dockerfile and for local reproducible environments.
#
# Create: micromamba create -f environment.yml
# Activate: micromamba activate hail-cat
#
# After activation install the project itself:
#   pip install -e ".[dev]"

name: hail-cat
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - numpy>=1.24
  - pandas>=1.5
  - scipy>=1.9
  - rasterio>=1.3
  - xarray>=2022.11
  - regionmask>=0.9
  - cartopy>=0.22
  - matplotlib>=3.6
  - netcdf4>=1.6
  - h5py>=3.7
  - scikit-learn>=1.1
  - boto3>=1.26
  - s3fs>=2022.11
  - tqdm>=4.64
  - requests>=2.28
  - pyarrow>=10
  - eccodes>=2.31          # required for cfgrib
  - cfgrib>=0.9.10
  - cdsapi>=0.5
  - pip

  # Dev / CI extras
  - pytest>=7.0
  - pytest-cov>=4.0
  - hypothesis>=6.0
  - pre-commit>=3.0

  - pip:
    - lmoments3>=1.0.4
    - tenacity>=8.0
