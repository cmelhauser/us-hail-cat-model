name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libeccodes-dev \
            libgeos-dev \
            libproj-dev \
            proj-bin \
            libhdf5-dev \
            libnetcdf-dev

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .
        continue-on-error: true   # advisory until legacy scripts are ruff-clean

      - name: Format check (ruff)
        run: ruff format --check .
        continue-on-error: true   # advisory until legacy scripts are ruff-formatted

      - name: Type check (mypy)
        run: mypy scripts/ --ignore-missing-imports
        continue-on-error: true   # advisory until type coverage improves

      - name: Syntax check (py_compile)
        run: python -m py_compile run_pipeline.py scripts/*.py

      - name: Unit tests
        env:
          OPENBLAS_NUM_THREADS: "1"
        run: |
          pytest -q tests \
            -m "not integration and not regression and not slow" \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0

      - name: Dry run
        run: python run_pipeline.py --dry-run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: test
    # Only run on main / v2.1 push, not every PR — integration is slow
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libeccodes-dev libgeos-dev libproj-dev proj-bin \
            libhdf5-dev libnetcdf-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Integration tests
        env:
          OPENBLAS_NUM_THREADS: "1"
        run: |
          pytest -q tests -m "integration" --timeout=300
